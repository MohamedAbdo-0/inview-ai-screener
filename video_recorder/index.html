
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">
  <style>
      body { background-color: transparent; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Tahoma, sans-serif; direction: rtl; margin: 0; padding: 10px; overflow: hidden; }
      #vid-container { 
          width: 100%; 
          max-width: 850px; 
          position: relative; 
          background: #0d0d0d; 
          border-radius: 30px; 
          overflow: hidden; 
          border: 1px solid rgba(9, 132, 227, 0.4);
          box-shadow: 0 0 30px rgba(9, 132, 227, 0.2); 
      }
      video { width: 100%; height: auto; transform: scaleX(-1); display: block; object-fit: cover; }
      .overlay { position: absolute; bottom: 0; left: 0; right: 0; text-align: center; padding: 35px 20px; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); }
      .question-text { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 25px; line-height: 1.4; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
      #controls button { 
          padding: 16px 35px; 
          border-radius: 12px; 
          font-size: 16px; 
          border: none; 
          color: white; 
          cursor: pointer; 
          margin: 0 10px; 
          font-weight: bold; 
          min-width: 180px; 
          transition: 0.4s; 
          box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
      }
      #nextBtn { background: linear-gradient(135deg, #0984e3, #00cec9); display: none; }
      #nextBtn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(9, 132, 227, 0.4); }
      #startBtn { background: linear-gradient(135deg, #d63031, #e17055); }
      #startBtn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(214, 48, 49, 0.4); }
      #finishBtn { background: linear-gradient(135deg, #00b894, #55efc4); display: none; }
      #finishBtn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4); }
      #recordingBadge { 
          position: absolute; 
          top: 30px; 
          right: 30px; 
          background: rgba(255, 0, 0, 0.9); 
          color: white; 
          padding: 6px 18px; 
          border-radius: 8px; 
          font-weight: 800; 
          font-size: 12px; 
          display: none; 
          animation: pulse 1.5s infinite; 
          box-shadow: 0 0 15px rgba(255,0,0,0.5);
      }
      @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
      #startPanel { 
          background: rgba(0,0,0,0.8); 
          backdrop-filter: blur(10px);
          height: 100%; 
          display: flex; 
          flex-direction: column; 
          justify-content: center; 
          align-items: center; 
          position: absolute; 
          top: 0; 
          left: 0; 
          width: 100%; 
          z-index: 10;
      }
  </style>
</head>
<body>
  <div id="vid-container">
    <div id="recordingBadge">🔴 REC</div>
    <video id="live" autoplay muted playsinline></video>
    <div id="startPanel">
       <div class="question-text" style="font-size:30px;">مرحباً بك في مقابلة الـ AI 🤖</div>
       <button id="startBtn" onclick="startInterview()">▶️ بدء المقابلة</button>
    </div>
    <div class="overlay" id="overlayPanel" style="display:none;">
        <div class="question-text" id="qtext">...</div>
        <div id="controls">
           <button id="nextBtn">انتقال للسؤال التالي</button>
           <button id="finishBtn">إنهاء ✔️</button>
        </div>
    </div>
  </div>
  
  <script>
    let questions = [];
    let audios = [];
    let current_q = 0;
    let stream;
    let recorder;
    let chunks = [];
    let isInitialized = false;
    let startTime;
    let timestamps = [];
    
    const liveVid = document.getElementById('live');
    const startPanel = document.getElementById('startPanel');
    const overlayPanel = document.getElementById('overlayPanel');
    const qtext = document.getElementById('qtext');
    const nextBtn = document.getElementById('nextBtn');
    const finishBtn = document.getElementById('finishBtn');
    const recordingBadge = document.getElementById('recordingBadge');
    
    window.addEventListener("message", function(event) {
       if (event.data.type === "streamlit:render" && !isInitialized) {
           const args = event.data.args;
           if(args.questions && args.audios) {
               questions = JSON.parse(args.questions);
               audios = JSON.parse(args.audios);
               isInitialized = true;
           }
       }
    });

    navigator.mediaDevices.getUserMedia({video: true, audio: true})
      .then(s => { liveVid.srcObject = s; stream = s; })
      .catch(e => alert("عفواً، لا بد من السماح للكاميرا والميكروفون كي نبدأ المقابلة."));

    function startInterview() {
       startPanel.style.display = "none";
       overlayPanel.style.display = "block";
       recordingBadge.style.display = "block";
       recorder = new MediaRecorder(stream, {mimeType: 'video/webm'});
       recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
       recorder.onstop = () => {
          let currTime = ((Date.now() - startTime) / 1000.0).toFixed(2);
          timestamps.push(currTime);
          if (stream) {
             stream.getTracks().forEach(track => track.stop());
          }
          liveVid.srcObject = null;
          recordingBadge.style.display = "none";
          const blob = new Blob(chunks, {type: 'video/webm'});
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          reader.onloadend = () => {
              if(window.parent) {
                 window.parent.postMessage({
                    isStreamlitMessage: true,
                    type: "streamlit:setComponentValue",
                    value: { video: reader.result, splits: timestamps },
                    dataType: "json"
                 }, "*");
              }
              qtext.innerHTML = "✅ اكتملت المقابلة بنجاح.";
          }
       };
       startTime = Date.now();
       timestamps.push(0);
       recorder.start();
       playQuestion(0);
    }
    
    function playQuestion(index) {
       qtext.innerText = questions[index];
       nextBtn.style.display = "none";
       let au = new Audio(audios[index]);
       au.onended = () => {
           if (index === questions.length - 1) {
               finishBtn.style.display = "inline-block";
           } else {
               nextBtn.style.display = "inline-block";
           }
       };
       au.play();
    }
    
    nextBtn.onclick = () => {
       let currTime = ((Date.now() - startTime) / 1000.0).toFixed(2);
       timestamps.push(currTime);
       current_q++;
       playQuestion(current_q);
    };
    
    finishBtn.onclick = () => {
       nextBtn.style.display = "none";
       finishBtn.style.display = "none";
       recorder.stop();
    };
    
    if(window.parent) {
       window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
       setInterval(() => {
         window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: document.body.scrollHeight + 30 }, "*");
       }, 1000);
    }
  </script>
</body>
</html>
